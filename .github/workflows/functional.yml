name: Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "53 2 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: youtube_topk
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run migrations
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/youtube_topk alembic upgrade head
      - name: Run functional tests
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/youtube_topk python -m pytest tests/functional/ -v
